<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Win Counter</title>
  <style>
    body {
      background: transparent;
      color: white;
      font-family: Arial;
      text-align: center;
    }
    #counter {
      font-size: 60px;
      font-weight: bold;
    }
    button {
      font-size: 30px;
      margin: 10px;
      padding: 10px 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="counter">Wins: 0</div>

<div>
  <button onclick="addWin()">➕</button>
  <button onclick="removeWin()">➖</button>
</div>

<script>
  let wins = localStorage.getItem("wins") || 0;

  function updateDisplay() {
    document.getElementById("counter").innerText = "Wins: " + wins;
  }

  function addWin() {
    wins++;
    localStorage.setItem("wins", wins);
    updateDisplay();
  }

  function removeWin() {
    if (wins > 0) wins--;
    localStorage.setItem("wins", wins);
    updateDisplay();
  }

  updateDisplay();
</script>

</body>
</html>
